<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="space" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#19213a"/>
      <stop offset="100%" stop-color="#070b14"/>
    </radialGradient>

    <radialGradient id="marsBase" cx="34%" cy="26%" r="78%">
      <stop offset="0%" stop-color="#ffcd9f"/>
      <stop offset="48%" stop-color="#dc7348"/>
      <stop offset="100%" stop-color="#7e2e21"/>
    </radialGradient>

    <radialGradient id="atmo" cx="50%" cy="50%" r="64%">
      <stop offset="74%" stop-color="#0000"/>
      <stop offset="100%" stop-color="#ff9f6f7f"/>
    </radialGradient>

    <radialGradient id="specular" cx="30%" cy="24%" r="44%">
      <stop offset="0%" stop-color="#fff8"/>
      <stop offset="100%" stop-color="#fff0"/>
    </radialGradient>

    <linearGradient id="nightMask" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0000"/>
      <stop offset="58%" stop-color="#0001"/>
      <stop offset="100%" stop-color="#000a"/>
    </linearGradient>

    <filter id="dustNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="17" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.09" />
      </feComponentTransfer>
    </filter>

    <clipPath id="planetClip">
      <circle cx="32" cy="32" r="16"/>
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#space)"/>

  <circle cx="10.8" cy="14" r="1.1" fill="#dbe6ff"/>
  <circle cx="50.8" cy="11.8" r="0.9" fill="#f7faff"/>
  <circle cx="56.4" cy="45.1" r="0.85" fill="#e8efff"/>
  <circle cx="8.9" cy="49.2" r="0.8" fill="#d5e0ff"/>

  <circle cx="32" cy="32" r="18.5" fill="url(#atmo)"/>
  <circle cx="32" cy="32" r="16" fill="url(#marsBase)"/>

  <g clip-path="url(#planetClip)">
    <!-- Rotating albedo bands -->
    <g>
      <animateTransform
        attributeName="transform"
        type="translate"
        values="-16 0;16 0;-16 0"
        dur="8s"
        repeatCount="indefinite"
      />
      <path d="M8 31c5-2.6 9.5-2.7 14.6-.2 5.4 2.5 10.7 2.6 16.1 0 5.2-2.5 10.3-2.5 15.3.1" fill="none" stroke="#7b2f22" stroke-width="2.4" stroke-linecap="round" opacity="0.76"/>
      <path d="M6 26.4c4.2-2 8.1-2.2 12.4-.5 4.9 1.9 9.7 1.8 14.2-.2 4.7-2 9.3-2.1 13.8-.3 4.9 2 9.6 1.9 14-.2" fill="none" stroke="#8c3a27" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M7.5 37.7c4.7-1.9 8.7-1.7 13.1.2 4.8 2 9.9 2 14.6-.1 4.5-2 8.8-2.2 13.1-.2 4.6 2.1 9.1 2 13.8-.1" fill="none" stroke="#6f2e23" stroke-width="1.8" stroke-linecap="round" opacity="0.58"/>
      <ellipse cx="20" cy="34.5" rx="2.8" ry="1.9" fill="#723022" opacity="0.78"/>
      <ellipse cx="31.5" cy="39" rx="2.1" ry="1.5" fill="#6c2d21" opacity="0.7"/>
      <ellipse cx="41.8" cy="28.6" rx="2.3" ry="1.6" fill="#7a3224" opacity="0.74"/>
      <ellipse cx="48.6" cy="34.2" rx="1.8" ry="1.3" fill="#6a2a1f" opacity="0.66"/>
    </g>

    <!-- Fine grain -->
    <rect x="16" y="16" width="32" height="32" filter="url(#dustNoise)" fill="#000"/>
    <rect x="16" y="16" width="32" height="32" fill="url(#nightMask)"/>
    <circle cx="32" cy="32" r="16" fill="url(#specular)"/>
  </g>

  <circle cx="32" cy="32" r="16" fill="none" stroke="#ffbe9060" stroke-width="0.9"/>
</svg>